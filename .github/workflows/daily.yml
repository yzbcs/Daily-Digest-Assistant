name: Daily Paper Digest

on:
  schedule:
    - cron: "0 4 * * *"    # UTC 04:00 = 北京时间 12:00，每天（小红书不休息）
  workflow_dispatch:        # 支持手动触发（测试用）

jobs:
  send-digest:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Node.js dependencies
        run: npm install

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run daily digest
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          EMAIL_USER:  ${{ secrets.EMAIL_USER }}
          EMAIL_PASS:  ${{ secrets.EMAIL_PASS }}
          EMAIL_TO:    ${{ secrets.EMAIL_TO }}
          XHS_COOKIE:  ${{ secrets.XHS_COOKIE }}
        run: python main.py

      - name: Upload preview.html artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-html
          path: preview.html

  sync-pages:
    if: github.repository == 'yzbcs/Daily-Digest-Assistant'
    needs: send-digest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download preview.html artifact
        uses: actions/download-artifact@v4
        with:
          name: digest-html

      - name: Prepare digest HTML
        run: |
          DATE=$(date +%Y-%m-%d)
          MONTH=$(date +%Y/%m)
          mkdir -p study/daily/$MONTH
          cp preview.html study/daily/$MONTH/$DATE.html

      - name: Copy index.html
        run: cp templates/study_index.html study/index.html

      - name: Update data.json
        run: python3 scripts/update_study_data.py

      - name: Push to yzbcs.github.io
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.Yzbcs_TOKEN }}
          publish_dir: ./study
          external_repository: yzbcs/yzbcs.github.io
          publish_branch: main
          commit_message: "auto: sync daily digest $(date +%Y-%m-%d)"
