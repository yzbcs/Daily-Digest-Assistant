name: Daily Paper Digest

on:
  schedule:
    - cron: "0 4 * * *"    # UTC 04:00 = 北京时间 12:00，每天（小红书不休息）
  workflow_dispatch:        # 支持手动触发（测试用）

jobs:
  send-digest:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Node.js dependencies
        run: npm install

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run daily digest
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          EMAIL_USER:  ${{ secrets.EMAIL_USER }}
          EMAIL_PASS:  ${{ secrets.EMAIL_PASS }}
          EMAIL_TO:    ${{ secrets.EMAIL_TO }}
          XHS_COOKIE:  ${{ secrets.XHS_COOKIE }}
        run: python main.py

      - name: Upload preview.html artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-html
          path: preview.html

      - name: Archive daily digest to docs/
        run: |
          DATE=$(date +%Y-%m-%d)
          YEAR=$(date +%Y)
          MONTH=$(date +%m)
          DAILY_DIR="docs/daily/$YEAR/$MONTH"
          mkdir -p "$DAILY_DIR"
          cp preview.html "$DAILY_DIR/$DATE.html"
          echo "✅ 已归档到 $DAILY_DIR/$DATE.html"

      - name: Update docs/daily/index.json
        run: |
          python3 -c "
          import json, os, sys
          from datetime import datetime

          index_path = 'docs/daily/index.json'
          date_str = os.environ.get('DATE', datetime.now().strftime('%Y-%m-%d'))
          year, month, day = date_str.split('-')
          html_path = f'daily/{year}/{month}/{date_str}.html'

          items = []
          if os.path.exists(index_path):
              try:
                  with open(index_path, 'r', encoding='utf-8') as f:
                      items = json.load(f)
              except Exception:
                  items = []

          # 去重：如果今天已有记录，先移除
          items = [i for i in items if i.get('date') != date_str]

          # 读取 preview.html 获取论文/笔记数量（简单解析）
          papers_count = 0
          notes_count = 0
          preview_path = 'preview.html'
          if os.path.exists(preview_path):
              content = open(preview_path, 'r', encoding='utf-8').read()
              papers_count = content.count('arxiv.org')
              notes_count = content.count('xhslink.com')

          items.append({
              'date': date_str,
              'path': html_path,
              'papers': papers_count,
              'notes': notes_count
          })

          # 按日期降序
          items.sort(key=lambda x: x['date'], reverse=True)

          with open(index_path, 'w', encoding='utf-8') as f:
              json.dump(items, f, ensure_ascii=False, indent=2)

          print(f'✅ 已更新索引：{date_str} | 论文 {papers_count} 篇 | 笔记 {notes_count} 条')
          print(f'📊 总记录数：{len(items)}')
          "

      - name: Commit and push archive
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/daily/
          git diff --quiet && git diff --staged --quiet || git commit -m "auto: archive daily digest $(date +%Y-%m-%d)"
          git push

  sync-pages:
    if: github.repository == 'yzbcs/Daily-Digest-Assistant'
    needs: send-digest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download preview.html artifact
        uses: actions/download-artifact@v4
        with:
          name: digest-html

      - name: Prepare digest HTML
        run: |
          DATE=$(date +%Y-%m-%d)
          MONTH=$(date +%Y/%m)
          mkdir -p study/daily/$MONTH
          cp preview.html study/daily/$MONTH/$DATE.html

      - name: Copy index.html
        run: cp templates/study_index.html study/index.html

      - name: Fetch existing data.json from target repo
        run: |
          # 尝试拉取现有 data.json，最多重试 3 次
          for i in 1 2 3; do
            if curl -sL --max-time 10 "https://yzbcs.github.io/study/data.json" -o study/data.json; then
              # 校验是否为有效 JSON
              if python3 -c "import json; json.load(open('study/data.json'))" 2>/dev/null; then
                echo "✅ 成功拉取现有 data.json"
                cat study/data.json
                break
              fi
            fi
            echo "⚠️ 第 $i 次拉取失败，等待 5 秒后重试..."
            sleep 5
          done
          # 如果仍然失败，使用空数据（但打印警告）
          if [ ! -f study/data.json ] || ! python3 -c "import json; json.load(open('study/data.json'))" 2>/dev/null; then
            echo "❌ 无法拉取现有 data.json，将创建新索引（历史记录可能丢失！）"
            echo '{"notes":[]}' > study/data.json
          fi

      - name: Update data.json
        run: python3 scripts/update_study_data.py

      - name: Verify data.json content
        run: |
          echo "📄 即将推送的 data.json 内容："
          cat study/data.json
          echo ""
          echo "📊 记录数量：$(python3 -c 'import json; print(len(json.load(open("study/data.json"))["notes"]))')"

      - name: Push to yzbcs.github.io
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clone 目标仓库
          git clone --depth=1 https://x-access-token:${{ secrets.Yzbcs_TOKEN }}@github.com/yzbcs/yzbcs.github.io.git target-repo

          # 复制 study 文件夹到目标仓库
          cp -r study/* target-repo/study/

          # 进入目标仓库并推送
          cd target-repo
          git add study/
          git diff --quiet && git diff --staged --quiet || git commit -m "auto: sync daily digest $(date +%Y-%m-%d)"
          git push origin master
