# ============================================================
# Arxiv Daily Digest — 用户配置文件
# Fork 后只需修改此文件 + 在 GitHub Secrets 中填写密钥
# ============================================================

# ── 论文关键词 ──────────────────────────────────────────────
# 支持多个关键词，命中任意一个即进入候选（OR 关系）
# 代码会自动将单词两两组合成高优先级短语（如 agent+skill → "agent skill"）
# 专有框架名打分权重最高
keywords:
  - LLM Agent
  - Agent
  - Skill
  - Skill Learning
  - Skill Retrieval
  - Skill Refinement
  - Skill Evolution
  - openclaw

# ── arxiv 分类 ──────────────────────────────────────────────
# 留空则搜索全部分类。常用：cs.AI cs.LG cs.RO cs.CL cs.CV
categories:
  - cs.AI
  - cs.CL
  - cs.LG
  - cs.RO

# ── 推送数量与质量 ──────────────────────────────────────────
# 每日最多推送篇数（LLM 从候选中精选）
max_papers: 10

# LLM 相关性评分门槛（1-10）
# 低于此分的论文不推送，即使凑不满 max_papers 也不推
# 建议范围：6（默认，平衡） / 7-8（严格） / 4-5（宽松）
min_score: 5

# arxiv 初始搜索数量，由 LLM 从中筛选出 max_papers 篇
# 建议 candidate_pool >= max_papers * 3
candidate_pool: 80

# ── 邮件与 LLM 配置 ─────────────────────────────────────────
# 发件邮箱服务商（163 / gmail / qq）
smtp_provider: "163"

# LLM 服务商
# 内置可选：minimax / claude / openai / deepseek / zhipu / moonshot / qwen
# 也可填自定义名称（需在下方 custom_llm 中定义）
# 对应 API Key 填写到 GitHub Secrets 的 LLM_API_KEY
llm_provider: minimax

# ── 自定义 LLM 提供商（可选）────────────────────────────────
# 当你使用的 API 不在内置列表中时，在此配置。
# 大多数国产/自建 API 都使用 OpenAI 兼容协议，只需填写 base_url 和 model 即可。
#
# 配置项说明：
#   - sdk: "openai"（绝大多数国产模型）或 "anthropic"（Claude 协议）
#   - base_url: API 地址（注意要包含 /v1 后缀）
#   - model: 模型名称（请向你的 API 提供商确认）
#
# 示例 1 — 使用 OpenAI 兼容协议的自建 API：
#   custom_llm:{
#     my_api:
#       sdk: openai
#       base_url: "https://my-api.com/v1"
#       model: "gpt-4o"
#   }
#   # 然后在上方 llm_provider 填：llm_provider: my_api
#
# 示例 2 — 使用 Anthropic 兼容协议的自建 API：
#   custom_llm:{
#     my_claude:
#       sdk: anthropic
#       base_url: "https://my-claude-proxy.com"
#       model: "claude-3-haiku-20240307"
#   }
#   # 然后在上方 llm_provider 填：llm_provider: my_claude
#
# 默认不使用自定义 API，保持空配置：
custom_llm: {}

# ── 小红书配置 ───────────────────────────────────────────────
# 留空则复用上方 keywords；如需单独配置小红书搜索词，在此填写
# XHS_COOKIE 填写到 GitHub Secrets（不填则跳过小红书抓取，仅发 arXiv）
# 示例：xhs_keywords: [AI工具, 产品评测, 开源项目]
xhs_keywords: []

# 小红书初始搜索候选数量（每个关键词均分）
xhs_candidate_pool: 80
